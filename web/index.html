<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/portrait.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amelia's Braindump.io</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #141414;
        background: #fff;
      }

      a {
        color: inherit;
      }

      .wrap {
        flex: 1 0 auto;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
      }

      /* ——— Nav ——— */
      .nav {
        border-bottom: 1px solid #d4d0ca;
        padding: 16px 0;
      }

      .nav__inner {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .nav__title-group {
        display: flex;
        align-items: center;
        gap: 24px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .nav__portrait {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        border-radius: 50%;
        object-fit: cover;
        border: none;
        background: none;
        outline: none;
      }

      .nav__brand {
        margin: 0;
        flex: 1 1 auto;
        min-width: 0;
        font-size: clamp(16px, 2.1vw, 20px);
        font-weight: 500;
        line-height: 1.25;
        letter-spacing: -0.02em;
        color: #6e6e6e;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav__search {
        flex: 0 1 240px;
      }

      .nav__search input {
        width: 100%;
        padding: 8px 14px;
        font: inherit;
        font-size: 14px;
        color: #252525;
        background: #f6f6f5;
        border: 1px solid #cfcfcd;
        border-radius: 999px;
        outline: none;
      }

      .nav__search input::placeholder {
        color: #8a8a8a;
      }

      .nav__search input:focus {
        border-color: #b0aea8;
        background: #fff;
      }

      .nav__search-btn {
        display: none;
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        background: #f6f6f5;
        border: 1px solid #cfcfcd;
        border-radius: 10px;
        cursor: pointer;
        padding: 0;
      }

      .nav__search-btn:hover {
        background: #ebeae8;
      }

      /* ——— Mobile nav ——— */
      @media (max-width: 768px) {
        .nav {
          padding: 12px 0;
        }

        .nav__inner {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          min-height: 0;
          padding: 0 20px;
        }

        .nav__title-group {
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          width: calc(100% - 64px);
          max-width: 100%;
          justify-content: center;
        }

        .nav__portrait {
          width: 36px;
          height: 36px;
        }

        .nav__brand {
          flex: 0 1 auto;
          min-width: 0;
          text-align: center;
          font-size: clamp(14px, 4vw, 17px);
        }

        .nav__search {
          display: none;
        }

        .nav__search-btn {
          display: flex;
          position: relative;
          z-index: 1;
          flex-shrink: 0;
        }
      }

      /* ——— Categories ——— */
      .categories {
        padding: 56px 0 48px;
      }

      .categories h2 {
        margin: 0 0 20px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #5a5a5a;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      @media (max-width: 768px) {
        .wrap {
          padding: 0 20px;
        }

        .grid {
          grid-template-columns: 1fr;
          gap: 14px;
        }

        .categories {
          padding-bottom: 40px;
        }
      }

      /* ——— Cards ——— */
      .card {
        display: flex;
        flex-direction: column;
        min-height: 160px;
        padding: 20px;
        background: #fff;
        border: 1px solid #d2d2d0;
        border-radius: 8px;
        text-align: left;
        transition:
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }

      .card:hover {
        box-shadow: 0 6px 28px rgba(0, 0, 0, 0.09);
        transform: translateY(-2px);
      }

      .card__title {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: #111;
        letter-spacing: -0.01em;
      }

      .card__rule {
        margin: 14px 0 12px;
        border: none;
        border-top: 1px solid #e4e4e2;
      }

      .card__subtitle {
        margin: 0;
        flex: 1;
        font-size: 14px;
        color: #5c5c5c;
        min-height: 1.4em;
      }

      .card__subtitle:empty {
        min-height: 0;
        margin: 0;
      }

      .card__subtitle:empty + .card__details {
        margin-top: 4px;
      }

      .card__details {
        margin-top: auto;
        padding-top: 16px;
        font-size: 14px;
        color: #5c5c5c;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .card__details:hover {
        color: #333;
      }

      /* ——— Footer ——— */
      .footer {
        flex-shrink: 0;
        padding: 16px 24px 20px;
        text-align: center;
        font-size: 13px;
        color: #6a6a6a;
      }

      .footer p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <div class="nav__inner">
        <div class="nav__title-group">
          <img
            class="nav__portrait"
            src="/portrait.svg"
            width="40"
            height="40"
            alt=""
          />
          <h1 class="nav__brand">Amelia's Notes & Brain Dump.</h1>
        </div>
        <label class="nav__search" aria-label="Search">
          <input type="search" placeholder="Search…" autocomplete="off" />
        </label>
        <button type="button" class="nav__search-btn" aria-label="Search">
          🔍
        </button>
      </div>
    </header>

    <main class="wrap">
      <section class="categories" aria-labelledby="categories-heading">
        <h2 id="categories-heading">Categories</h2>
        <div class="grid">
          <article class="card">
            <h3 class="card__title">SQL Notes for TA</h3>
            <hr class="card__rule" />
            <p class="card__subtitle">About SQL and databases</p>
            <a class="card__details" href="#">Details</a>
          </article>

          <article class="card">
            <h3 class="card__title">DSA</h3>
            <hr class="card__rule" />
            <p class="card__subtitle"></p>
            <a class="card__details" href="#">Details</a>
          </article>

          <article class="card">
            <h3 class="card__title">Server-side Development</h3>
            <hr class="card__rule" />
            <p class="card__subtitle">Notes about server from INFO 441</p>
            <a class="card__details" href="#">Details</a>
          </article>

          <article class="card">
            <h3 class="card__title">iOS Development</h3>
            <hr class="card__rule" />
            <p class="card__subtitle">Notes about iOS from INFO 449</p>
            <a class="card__details" href="#">Details</a>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Amelia Li</p>
    </footer>
  </body>
</html>
