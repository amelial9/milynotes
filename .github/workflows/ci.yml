name: Deploy site to GitHub Pages

# Builds the Vite app and pushes web/dist to the gh-pages branch.
# Production uses a relative asset base so it works on a custom domain (site root) and on
# https://<user>.github.io/<repo>/.
# In the repo: Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages, folder: / (root)
# (Do not use "GitHub Actions" as the Pages source when using this workflow.)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: npm ci && npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
          clean: true
