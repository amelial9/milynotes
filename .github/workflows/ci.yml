name: Deploy site to GitHub Pages

# Builds the Vite app and pushes web/dist to the gh-pages branch.
# Default: VITE_BASE_PATH=/<repo>/ for https://<user>.github.io/<repo>/ (project Pages).
#
# White page + 404 on /milynotes/assets/... or /milynotes/portrait.svg?
#   Your live site is served at the DOMAIN ROOT (custom domain like https://example.com/, or
#   a user/org site repo). Those URLs have NO /milynotes prefix on the server. Fix:
#   Repo → Settings → Secrets and variables → Actions → Variables → New variable
#   Name: VITE_BASE_PATH   Value: /   (single slash, then save and re-run the workflow / push)
#
# Build also copies index.html → 404.html for SPA refresh on deep links.
# REQUIRED — or the live site will NOT update (this workflow only updates the gh-pages branch):
#   Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root)
# If Source is still "GitHub Actions" or "main" / docs, GitHub ignores gh-pages and keeps
# serving stale HTML (old /milynotes/ asset paths). Switch Source once, then wait ~1–2 min.

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Until all composite actions ship Node 24 runtimes (removes Node 20 deprecation warnings).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        env:
          VITE_BASE_PATH_INPUT: ${{ vars.VITE_BASE_PATH }}
        working-directory: web
        run: |
          # Do not inherit VITE_BASE_PATH from org-level env; CI sets it explicitly below.
          unset VITE_BASE_PATH || true
          if [ -z "$VITE_BASE_PATH_INPUT" ]; then
            export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          else
            export VITE_BASE_PATH="$VITE_BASE_PATH_INPUT"
          fi
          echo "VITE_BASE_PATH for this build: $VITE_BASE_PATH"
          # Do not set NODE_ENV=production before npm ci — that skips devDependencies and breaks tsc
          # (vite/client, @types/node). Vite already builds in production mode.
          npm ci && npm run build

      - name: Verify dist (SPA 404 + hashed assets)
        working-directory: web
        run: |
          echo "---- dist/index.html ----"
          cat dist/index.html
          test -f dist/404.html || (echo "::error::dist/404.html missing — npm run build should copy index.html"; exit 1)
          if ! grep -qE 'src="[^"]+assets/[^"]+\.js"' dist/index.html; then
            echo "::error::dist/index.html must reference hashed JS under assets/"
            exit 1
          fi

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
          clean: true

      - name: Reminder — Pages must publish from gh-pages
        run: |
          echo "::warning::If the site does not update or shows a white page, open Repo Settings → Pages and set the publishing source to branch **gh-pages** at folder **/** (not GitHub Actions or main). This workflow only pushes files to gh-pages; it does not choose what GitHub serves."
