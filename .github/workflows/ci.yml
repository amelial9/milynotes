name: Deploy site to GitHub Pages

# Builds the Vite app and pushes web/dist to the gh-pages branch.
# Production uses a relative asset base so it works on a custom domain (site root) and on
# https://<user>.github.io/<repo>/.
# In the repo: Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages, folder: / (root)
# (Do not use "GitHub Actions" as the Pages source when using this workflow.)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Until all composite actions ship Node 24 runtimes (removes Node 20 deprecation warnings).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          # Do not inherit VITE_BASE_PATH from org/repo env (would break custom-domain relative builds).
          unset VITE_BASE_PATH || true
          # Do not set NODE_ENV=production before npm ci — that skips devDependencies and breaks tsc
          # (vite/client, @types/node). Vite already builds in production mode.
          npm ci && npm run build

      - name: Verify built index (relative assets, no /milynotes/)
        working-directory: web
        run: |
          echo "---- dist/index.html ----"
          cat dist/index.html
          if grep -qE '/milynotes/' dist/index.html; then
            echo "::error::dist/index.html still contains /milynotes/ — remove repo env VITE_BASE_PATH or fix vite base."
            exit 1
          fi
          if ! grep -qF './assets/' dist/index.html; then
            echo "::error::dist/index.html must reference ./assets/ for relative base build"
            exit 1
          fi

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
          clean: true
